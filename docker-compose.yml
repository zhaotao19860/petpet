name: petpet
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-petpet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-petpet_password}
      POSTGRES_DB: ${POSTGRES_DB:-petpet}
    volumes:
      - petpet-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-petpet} -d ${POSTGRES_DB:-petpet}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL:-postgresql://petpet:petpet_password@postgres:5432/petpet}
      SESSION_SECRET: ${SESSION_SECRET:-replace-me-in-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      AI_BASE_URL: ${AI_BASE_URL:-https://oneapi-comate.baidu-int.com}
      AI_API_KEY: ${AI_API_KEY:-}
      ONEAPI_TOKEN: ${ONEAPI_TOKEN:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_FAST_MODEL: ${AI_FAST_MODEL:-GLM-5-Turbo}
      AI_SMART_MODEL: ${AI_SMART_MODEL:-GPT-5.4-Mini}
      AI_MODEL_STRATEGY: ${AI_MODEL_STRATEGY:-speed-first}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-5000}
      AI_LONG_STORY_TIMEOUT_MS: ${AI_LONG_STORY_TIMEOUT_MS:-60000}
      AI_LONG_STORY_MAX_TOKENS: ${AI_LONG_STORY_MAX_TOKENS:-12000}
      TTS_PROVIDER: ${TTS_PROVIDER:-edge}
      TTS_BASE_URL: ${TTS_BASE_URL:-${AI_BASE_URL:-https://oneapi-comate.baidu-int.com}}
      TTS_API_KEY: ${TTS_API_KEY:-${ONEAPI_TOKEN:-${AI_API_KEY:-}}}
      TTS_MODEL: ${TTS_MODEL:-tts-1}
      TTS_ONEAPI_VOICE: ${TTS_ONEAPI_VOICE:-nova}
      TTS_EDGE_OUTPUT_FORMAT: ${TTS_EDGE_OUTPUT_FORMAT:-audio-24khz-96kbitrate-mono-mp3}
      TTS_TIMEOUT_MS: ${TTS_TIMEOUT_MS:-20000}
      STT_PROVIDER: ${STT_PROVIDER:-cloudflare}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_BASE_URL: ${CLOUDFLARE_BASE_URL:-https://api.cloudflare.com/client/v4}
      CLOUDFLARE_STT_MODEL: ${CLOUDFLARE_STT_MODEL:-@cf/openai/whisper}
      AI_STT_MODEL: ${AI_STT_MODEL:-whisper-1}
      AI_STT_TIMEOUT_MS: ${AI_STT_TIMEOUT_MS:-12000}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    volumes:
      - petpet-sound-uploads:/app/uploads

  web:
    build:
      context: ./web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  petpet-postgres-data:
  petpet-sound-uploads:
