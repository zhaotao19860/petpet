name: petpet
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-petpet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-petpet_password}
      POSTGRES_DB: ${POSTGRES_DB:-petpet}
    command:
      - postgres
      - -c
      - shared_buffers=32MB
      - -c
      - max_connections=20
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=16MB
      - -c
      - effective_cache_size=128MB
    volumes:
      - petpet-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-petpet} -d ${POSTGRES_DB:-petpet}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: petpet-server:prod
    restart: unless-stopped
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      NODE_OPTIONS: --max-old-space-size=128
      DATABASE_URL: ${DATABASE_URL:-postgresql://petpet:petpet_password@postgres:5432/petpet}
      SESSION_SECRET: ${SESSION_SECRET:-replace-me-in-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://pet.tom86.top}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - petpet-sound-uploads:/app/uploads

volumes:
  petpet-postgres-data:
  petpet-sound-uploads:
